# Agent evaluation cases. Run with `python manage.py agent_eval`.
#
# Each case spec:
#   id:         human-readable case slug (filter target for --case)
#   query:      what the user types in Spotlight
#   team_id:    UUID — the tenant context the agent runs under
#   user_id:    UUID — the requesting user (drives ACL)
#   setup:      optional pre-run setup (e.g. inject_note for injection tests)
#   expect:     declarative assertions; see runner.py::_check_expectations
#
# All cases share the same seeded team/user — every case must pass before
# we approve any agent-affecting PR. Seed data is the dev DB the repo
# already ships with (team 6f9de2de... has the indexed chats, tasks,
# and notes you can browse at OpenSearch Dashboards).
#
# Cost: each case is a real Gemini call (~$0.001 on gemini-2.5-flash),
# so the suite is cheap enough to run in CI.

# --------------------------------------------------------------------- #
# A. Simple RAG (3)                                                      #
# --------------------------------------------------------------------- #

- id: simple_rag_wip_tasks
  query: "What tasks are currently in WIP status?"
  fixture: true
  expect:
    tool_calls_at_least: 1
    # "What tasks are in WIP status" is a structural query — list_tasks
    # is the correct tool (search_knowledge_base would be a regression
    # to keyword guessing). The agent's prompt teaches it to prefer
    # structural tools for status/assignee/overdue questions.
    tools_used_contains: ["list_tasks"]
    no_errors: true

- id: simple_rag_opensearch_topic
  query: "Do we have any tasks about OpenSearch?"
  fixture: true
  expect:
    tools_used_contains: ["search_knowledge_base"]
    answer_contains_any: ["opensearch", "search"]
    no_errors: true

- id: simple_rag_notes_exist
  query: "Do we have any notes?"
  fixture: true
  expect:
    tools_used_contains: ["search_knowledge_base"]
    no_errors: true

# --------------------------------------------------------------------- #
# B. Specific-entity fetch (3)                                           #
# --------------------------------------------------------------------- #

# Note: the original `fetch_task_by_id` case (query "Show me the full
# content of task 1 …") was deleted — task id 1 doesn't exist in the
# eval fixture (lives in another team), so the case was just a duplicate
# of `acl_unauthorized_fetch_task`. The active fetch_task coverage now
# lives in `fetch_existing_task_v1_launch` (search-then-read flow) and
# `fetch_nonexistent_task` (error-path) below.

- id: fetch_existing_task_v1_launch
  # Rewritten from `fetch_task_opensearch` (which queried task id 9
  # that doesn't exist). Asks about an existing task by NAME so the
  # agent can search → snippet OR search → fetch_task. We don't pin
  # the tool to fetch_task because for an entity this well-titled,
  # search alone may already have enough content.
  query: "Tell me about the v1.0 Public Launch task."
  fixture: true
  expect:
    tool_calls_at_least: 1
    answer_contains_any: ["launch", "v1.0", "public", "marketing"]
    no_errors: true

- id: fetch_pm_chat
  query: "Show me the latest messages in the genos-test project chat (project id 1)."
  fixture: true
  expect:
    tools_used_contains: ["fetch_chat_thread"]
    no_errors: true

# --------------------------------------------------------------------- #
# C. Multi-step search → fetch (2)                                       #
# --------------------------------------------------------------------- #

- id: multi_step_search_then_fetch_existing
  # Rewritten from `multi_step_task_then_detail` (which asked about an
  # OpenSearch task that doesn't exist in fixture). Asks about a topic
  # that's spread across multiple entities, so the agent reasonably
  # searches and may follow up with a fetch.
  query: "Find the task about responsive navigation and tell me what its acceptance criteria say."
  fixture: true
  expect:
    # The agent decides whether a fetch_task is needed — if the search
    # snippet already contains enough, a single search is correct
    # behaviour. We require: at least one tool call, the answer is
    # grounded (cites the task it found), and step budget respected.
    tool_calls_at_least: 1
    tools_used_contains: ["search_knowledge_base"]
    has_citations: true
    no_errors: true

- id: multi_step_citation_required
  query: "Summarize what's happening in our workspace right now. Cite each claim."
  fixture: true
  expect:
    tool_calls_at_least: 1
    no_errors: true
    # At least one [entity_id] citation must appear in the final answer.
    has_citations: true

# --------------------------------------------------------------------- #
# D. No-result / unindexed query (2)                                     #
# --------------------------------------------------------------------- #

- id: no_result_quantum_computing
