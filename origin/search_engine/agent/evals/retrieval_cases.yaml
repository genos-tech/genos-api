# ============================================================ #
# H. ACL / cross-tenant safety                                   #
# ============================================================ #

- id: acl_unknown_team_returns_empty
  # An obviously-non-existent team_id MUST return zero results — no
  # leaks from other tenants. Bypasses `fixture:` so we hard-code.
  query: "Plausible analytics"
  team_id: "00000000-0000-4000-8000-deadbeef0000"
  user_id: "00000000-0000-4000-8000-deadbeef0001"
  expect:
    result_count_at_most: 0

# ============================================================ #
# I. Robustness / negative                                       #
# ============================================================ #

- id: gibberish_returns_few_or_nothing
  fixture: true
  query: "quantum photosynthesis xylophone marauder"
  expect:
    result_count_at_most: 3

- id: single_letter_query_no_crash
  fixture: true
  query: "a"
  expect:
    # Single-letter shouldn't crash; result count is unconstrained.
    result_count_at_least: 0

- id: empty_after_strip_no_crash
  fixture: true
  query: "   "
  expect:
    result_count_at_most: 50  # liberal — just confirm no crash

- id: future_date_filter_returns_empty
  fixture: true
  query: "task"
  date_from: "2099-01-01T00:00:00+00:00"
  expect:
    result_count_at_most: 0

- id: limit_is_respected
  fixture: true
  query: "task"
  limit: 3
  expect:
    result_count_at_most: 3

- id: vector_only_typo_tolerance
  fixture: true
  # Misspelling — vector lane should still surface the framer-motion
  # entity even though keyword lane misses on the typo.
  query: "framr-motion vs CSS animations"
  expect:
    must_contain_title_in_top_n:
      n: 5
      title_substrings: ["framer-motion"]

