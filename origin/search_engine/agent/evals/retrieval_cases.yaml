# Retrieval-quality eval cases. Run with:
#
#   python manage.py agent_eval_setup       # one-time fixture provision
#   python manage.py agent_eval --retrieval # the suite
#
# Each case calls `search(...)` DIRECTLY — no agent loop, no LLM
# calls — and asserts on the ranked entity list. Free + fast: ideal
# for CI on every PR.
#
# Case schema
# -----------
#   id            : required, slug, filter target for --case
#   query         : required, the search string
#   fixture: true : auto-fill team_id + user_id from the deterministic
#                   fixture (see agent/evals/fixture.py). Omit to pin
#                   your own UUIDs (for legacy / cross-tenant cases).
#   team_id       : optional, only when `fixture: true` is not set
#   user_id       : optional, only when `fixture: true` is not set
#   entity_types  : optional, ["chat","task","note"] — filter the search
#   date_from     : optional ISO-8601, lower bound on updated_at
#   date_to       : optional ISO-8601, upper bound on updated_at
#   limit         : optional, max entities returned (default 10)
#   use_vector    : optional, default true
#
#   expect:
#     # Hard-pinned ids — use only when ids are stable across reseeds.
#     must_contain_in_top_n:        { n, entity_ids: [...] }
#     must_not_contain:             [entity_ids]
#
#     # Title substrings (robust across reseeds — preferred).
#     must_contain_title_in_top_n:  { n, title_substrings: [...] }
#     must_not_contain_title:       [substrings]
#     top_result_title_contains:    <substring>
#
#     # Entity-type assertions.
#     must_contain_entity_type_in_top_n: { n, entity_types: [...] }
#     top_result_entity_type:       <"chat"|"task"|"note"|"project">
#     result_count_at_least:        N
#     result_count_at_most:         N
#
# Fixture content (re-run `agent_eval_setup --reseed` to refresh):
#   Projects:   WRD (Website Redesign), QRD (Q2 Roadmap)
#   Tasks:      WRD-1..9 + QRD-1..9 covering perf budget, design
#               system v3, framer-motion spike, customer interviews,
#               Plausible, accessibility, Q3 OKRs, competitor analysis
#   Notes:      4 personal + 1 task note (interview methodology)
#               + 1 chat note (Sprint 1 kickoff recap)
#   Chats:      4 DMs (Bob / Carol / Dan / self) + 1 GM "general"
#               + 2 PMs (project chats per project)
#
# Add a case
# ----------
# 1. Pick a query a real user would type.
# 2. Decide whether retrieval should surface a specific entity (rank
#    assertion) or a set of entities (recall assertion).
# 3. Prefer `must_contain_title_in_top_n` over `must_contain_in_top_n`
#    — fixture ids drift across reseeds but titles are stable.
# 4. Run `python manage.py agent_eval --retrieval --case <id>` to
#    iterate.

# ============================================================ #
# A. Distinctive-content recall (vector lane carries)            #
# ============================================================ #

- id: perf_budget_finds_relevant_entities
  fixture: true
  query: "What's the perf budget for the marketing site?"
  expect:
    # Either the spike task or the design-system migration task
    # (which mentions Lighthouse ≥ 95 + JS ≤ 120KB in the body).
    must_contain_title_in_top_n:
      n: 5
      title_substrings: ["framer-motion"]

- id: framer_motion_decision_surfaces_spike
  fixture: true
  query: "Why did we rule out framer-motion?"
  expect:
    top_result_title_contains: "framer-motion"

- id: customer_interview_synthesis
  fixture: true
  query: "Summarize the customer interview signal so far"
  expect:
    # Both the synthesis task AND the methodology task-note carry
    # the "customer interview" theme.
    must_contain_title_in_top_n:
      n: 5
      title_substrings: ["customer interview"]

- id: plausible_analytics_task
  fixture: true
  query: "How are we measuring traffic on the new pages?"
  expect:
    must_contain_title_in_top_n:
      n: 5
      title_substrings: ["Plausible"]

- id: hero_illustration_handoff
  fixture: true
  query: "Where's the Figma hero illustration handoff?"
  expect:
    # WRD-2 task body mentions Carol's hero illustration handoff
    # in Figma. The task title doesn't say "hero" — this case tests
    # body-content recall via vector lane.
    must_contain_title_in_top_n:
      n: 5
      title_substrings: ["design system v3", "Hero + FeatureGrid"]

