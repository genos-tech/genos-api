name: CI

# Deps come from this repo's own Pipfile/Pipfile.lock (finalize via Step 2 of the
# split runbook: swap in the real Pipfile, then `pipenv lock`).
# Rollout: `backend-django` (tests) is the check to mark *required* first;
# `backend-django-lint` (ruff) stays report-only until a lint cleanup pass.
#
# Path filtering happens INSIDE the workflow (the `changes` job below +
# job-level `if`), NOT via `on.pull_request.paths`. Both jobs are listed as
# required-check contexts in the (currently disabled) branch ruleset; a
# trigger-level filter would leave those checks "Expected" forever on a
# docs-only PR and block its merge, whereas a job skipped by an `if`
# condition reports success. Pushes to main are never filtered.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: backend-django-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Classifies the PR's changed files so docs-only PRs skip the expensive
  # jobs. FAIL-OPEN by construction: any API hiccup, or any event that is
  # not a pull_request, yields code=true — an unnecessary extra run is
  # noise, but a silently green-skipped test would be a correctness bug.
  # The inert list is a deliberately narrow denylist (never an allowlist:
  # a new top-level config file must default to running CI).
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Classify changed files (fail-open)
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename') || files=""
          if [ -z "$files" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "changed files:"; printf '%s\n' "$files"
          if printf '%s\n' "$files" | grep -Evq '^docs/|\.md$|^LICENSE|^\.gitignore$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  backend-django:
    name: backend-django (required-first)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # Dockerfile is python:3.11-slim and the code has no 3.12+ syntax, so 3.11
    # is the correct prod-parity version here.
    env:
      PIPENV_PIPFILE: ${{ github.workspace }}/Pipfile
      PIPENV_VENV_IN_PROJECT: "1"
      # Only DATABASE_URL is truly required (else settings fall back to an
      # unreachable hardcoded host). API keys default to "" and clients are
      # mocked, so they are intentionally NOT set.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/origin
      DJANGO_SETTINGS_MODULE: apis.settings_test
      DJANGO_SECRET_KEY: ci-test-secret-key
      JWT_SECRET_KEY: ci-test-secret-key
    services:
      postgres:
        # Match the local/Railway Postgres major (local docker-compose uses
        # postgres:15).
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: origin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip pipenv
      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-py311-pipenv-${{ hashFiles('Pipfile.lock') }}
      - name: Install deps (locked prod deps + test tooling)
        run: |
          pipenv sync
          # Belt-and-suspenders: INSTALLED_APPS has "anymail". Once Step 2's
          # `pipenv lock` bakes django-anymail into Pipfile.lock, `pipenv sync`
          # covers it and this line becomes a no-op.
          pipenv run pip install 'django-anymail[resend]'
          pipenv run pip install -r requirements-dev.txt
      - name: Django system check
        run: pipenv run python manage.py check --settings=apis.settings_test
      - name: Migration drift check
        run: pipenv run python manage.py makemigrations --check --dry-run --settings=apis.settings_test
      - name: Tests + coverage
        # No --parallel: keeps coverage capture simple/correct. The migrations
        # dominate cold-start; revisit --parallel + multiprocessing coverage if
        # wall time becomes a problem.
        run: |
          pipenv run coverage run manage.py test origin.tests --settings=apis.settings_test
          pipenv run coverage xml
          pipenv run coverage report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: django-coverage
          path: coverage.xml
          if-no-files-found: ignore

  backend-django-lint:
    name: backend-django-lint (report-only)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # ruff is a standalone binary; no project deps or DB needed.
      - run: pip install ruff
      - run: ruff check origin apis
