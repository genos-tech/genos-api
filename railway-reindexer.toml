# Railway config for the `opensearch-reindexer` cron service.
#
# Same Docker image as the `backend-django` service (built from the
# same Dockerfile), but Railway runs it as a cron job: the container
# starts on each tick, runs the start command to completion, and
# exits. No gunicorn, no long-running process.
#
# What this does:
#   Every 10 minutes, re-emits all chats/tasks/notes whose
#   `ts_updated_at` is within the last 11 minutes (1-minute overlap
#   covers the gap between cron ticks) and upserts the affected
#   chunks into OpenSearch. The `RagChunk` tracking table keeps the
#   pass idempotent — unchanged chunks consume zero OpenAI / OpenSearch
#   cost.
#
# To run a full reindex instead (e.g. after a chunker change):
# SSH into the backend-django container from the Railway dashboard shell and run:
#   python manage.py opensearch_reindex
#
# NOTE: `railway run` cannot reach opensearch.railway.internal from your laptop.
# Always run OpenSearch commands from inside the Railway container.
#
# All env vars from `backend-django` (OPENSEARCH_HOST, OPENAI_API_KEY,
# DATABASE_URL, etc.) must also be set on this service — they read
# from the same `SEARCH_ENGINE` settings.

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend_django/Dockerfile"

[deploy]
# 10-minute cadence matches the `--since-minutes` value below; bump
# both together if you want a different incremental window.
# Absolute path avoids any ambiguity about the working directory when
# Railway executes the startCommand override.
#
# The startCommand goes through `railway-reindexer-entrypoint.sh` rather
# than calling manage.py directly: the cron's startCommand REPLACES the
# Dockerfile CMD, so the Vertex service-account-key decode baked into the
# CMD never runs here. The wrapper repeats that decode (no-op unless
# $GEMINI_SA_BASE64 is set) before running the reindex. `--since-minutes`
# stays here next to cronSchedule — bump both together to change cadence.
cronSchedule = "*/10 * * * *"
startCommand = "sh /app/backend_django/railway-reindexer-entrypoint.sh --since-minutes 11"
restartPolicyType = "NEVER"
